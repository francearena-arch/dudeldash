<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Dudel Dash" />
<meta name="theme-color" content="#1E2D4A" />
<meta name="description" content="Überlebe den Büroalltag! Ein viraler Endless Runner." />

<!-- Open Graph / Social Share -->
<meta property="og:title" content="Dudel Dash" />
<meta property="og:description" content="Überlebe den Büroalltag! Wie lange schaffst du es?" />
<meta property="og:type" content="website" />

<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./icons/icon-192.png" />
<link rel="icon" type="image/png" href="./icons/icon-192.png" />

<title>Dudel Dash — Überlebe den Büroalltag</title>
<link rel="stylesheet" href="./src/style.css" />
</head>
<body>
  <div id="wrap">
    <canvas id="gc"></canvas>
    <div id="ui">
      <div id="sc">0</div>
      <div id="bc">Best: 0</div>
      <button id="muteBtn" aria-label="Stumm schalten">🔊</button>
      <div id="jind"><div class="jdot" id="j0"></div><div class="jdot" id="j1"></div></div>
      <div class="screen startScreen" id="startS">
        <canvas id="preview" width="100" height="140" style="background:transparent"></canvas>
        <div class="stitle">DUDEL DASH</div>
        <div class="ssub">Überlebe den Büroalltag</div>
        <div class="cta-col">
          <button class="cta-btn cta-primary" id="playBtn">▶ Spiel starten</button>
          <button class="cta-btn cta-secondary" id="highscoreBtn">🏆 Highscores</button>
        </div>
        <div class="tips">
          <div class="tip"><span>Tippen</span>Springen</div>
          <div class="tip"><span>2× Tippen</span>Doppelsprung</div>
        </div>
      </div>
      <div class="screen" id="highscoreS" style="display:none;">
        <div class="stitle" style="font-size:clamp(24px,7vw,32px)">🏆 HIGHSCORES</div>
        <div class="hs-best">
          <div class="hs-label">Deine Bestleistung</div>
          <div class="hs-value" id="hsLocalBest">0</div>
          <div class="hs-sub">Sekunden im Büroalltag</div>
        </div>
        <div class="hs-placeholder">
          🌐 Online-Bestenliste folgt bald —<br>aktuell wird nur lokal gespeichert.
        </div>
        <button class="cta-btn cta-secondary" id="hsBackBtn">← Zurück</button>
      </div>
      <div class="screen" id="deathS" style="display:none;">
        <div class="d-line1">Du hast</div>
        <div class="dscore" id="fs">0</div>
        <div class="d-line2">Sekunden im Büroalltag überlebt</div>
        <div class="dmsg" id="dm"></div>
        <img id="deathCardImg" alt="" style="display:none;width:120px;border-radius:10px;margin-top:6px;box-shadow:0 8px 24px rgba(0,0,0,0.4);" />
        <div class="death-actions">
          <button class="sbtn" id="shareBtn">Teilen 📤</button>
          <button class="sbtn sbtn-secondary" id="downloadBtn">Bild speichern 💾</button>
        </div>
        <button class="cta-btn cta-primary" id="restartBtn" style="margin-top:14px">▶ Nochmal spielen</button>
      </div>
    </div>
  </div>
  <button id="openBtn" onclick="window.open(window.location.href,'_blank')">🔗 Im Browser öffnen</button>

  <script type="module" src="./src/game.js"></script>
</body>
</html>
